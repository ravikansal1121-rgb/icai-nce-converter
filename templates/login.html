<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ASAR & CO | ICAI NCE Converter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e4d8c 0%, #2a5fa8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 460px;
            width: 100%;
            overflow: hidden;
        }
        .login-header {
            background: linear-gradient(135deg, #1e4d8c, #e85d2c);
            padding: 30px 40px;
            text-align: center;
            color: white;
        }
        .login-header h3 { margin: 0; font-weight: 700; }
        .login-header p { margin: 5px 0 0; opacity: 0.9; font-size: 14px; }
        .login-body {
            padding: 30px 40px 40px;
        }
        .login-body h4 {
            color: #1e4d8c;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .login-body .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .form-control:focus {
            border-color: #e85d2c;
            box-shadow: 0 0 0 0.2rem rgba(232, 93, 44, 0.15);
        }
        .btn-asar {
            background: #e85d2c;
            border: none;
            color: white;
            padding: 12px;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .btn-asar:hover {
            background: #d04f1f;
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(232,93,44,0.3);
        }
        .login-footer {
            text-align: center;
            padding: 15px;
            color: white;
            font-size: 13px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div>
        <div class="login-card">
            <div class="login-header">
                <h3><i class="bi bi-file-earmark-ruled"></i> ASAR & CO</h3>
                <p>Chartered Accountants</p>
            </div>
            <div class="login-body">
                <h4><i class="bi bi-shield-lock"></i> Staff Login</h4>
                <p class="subtitle">ICAI NCE Financial Statement Converter</p>

                {% if error %}
                <div class="alert alert-danger py-2">
                    <i class="bi bi-exclamation-triangle"></i> {{ error }}
                </div>
                {% endif %}

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" name="password" class="form-control form-control-lg"
                               placeholder="Enter password" required autofocus>
                    </div>
                    <button type="submit" class="btn btn-asar w-100 btn-lg">
                        <i class="bi bi-box-arrow-in-right"></i> Login
                    </button>
                </form>
            </div>
        </div>
        <div class="login-footer">
            &copy; 2026 ASAR & CO Chartered Accountants &middot; Surat
        </div>
    </div>
</body>
</html>
